<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="Học từ vựng tiếng Anh qua trò chơi phiêu lưu đảo.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LingoLand">
    <link rel="icon" type="image/svg+xml" href="/lingo-land/favicon.svg">
    <link rel="apple-touch-icon" href="/lingo-land/icon.svg">
    <title>LingoLand - English Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .island-node { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .island-node:hover:not(.locked) { transform: scale(1.1) translateY(-5px); }
        .locked { filter: grayscale(1) opacity(0.6); cursor: not-allowed; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
        .card-back { transform: rotateY(180deg); }
        .progress-bar { transition: width 0.4s ease; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .floating { animation: bounce-subtle 3s ease-in-out infinite; }
        .perspective-1000 { perspective: 1000px; }
        @keyframes shake-x { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-8px); } 80% { transform: translateX(8px); } }
        .shake-x { animation: shake-x 0.45s ease-in-out; }
        @keyframes glow-pulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0); transform: scale(1); } 50% { box-shadow: 0 0 28px 10px rgba(16,185,129,0.55); transform: scale(1.08); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); transform: scale(1); } }
        .glow-pulse { animation: glow-pulse 0.9s ease-out; }
        .shadow-silhouette { filter: brightness(0) drop-shadow(0 6px 10px rgba(0,0,0,0.2)); }
        @keyframes balloon-float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        .balloon-float { animation: balloon-float 2.6s ease-in-out infinite; }
        @keyframes balloon-pop { 0% { transform: scale(1); opacity: 1; } 35% { transform: scale(1.35); opacity: 0.85; } 100% { transform: scale(0); opacity: 0; } }
        .balloon-pop { animation: balloon-pop 0.5s ease-out forwards; }
        .balloon-btn { position: relative; }
        .balloon-btn::before { content: ''; position: absolute; top: 14%; left: 22%; width: 22%; height: 14%; background: rgba(255,255,255,0.55); border-radius: 50%; filter: blur(2px); pointer-events: none; }

        /* Feed-the-animal animations */
        @keyframes animal-hungry { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(2px) scale(0.97); } }
        .animal-hungry { animation: animal-hungry 1.4s ease-in-out infinite; transform-origin: center bottom; }
        @keyframes animal-bounce { 0% { transform: translateY(0); } 25% { transform: translateY(-22px) scale(1.05); } 50% { transform: translateY(0) scale(0.98); } 75% { transform: translateY(-12px) scale(1.03); } 100% { transform: translateY(0); } }
        .animal-bounce { animation: animal-bounce 0.9s ease-out; }
        @keyframes animal-wiggle { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(-12deg); } 40% { transform: rotate(12deg); } 60% { transform: rotate(-8deg); } 80% { transform: rotate(8deg); } }
        .animal-wiggle { animation: animal-wiggle 0.9s ease-in-out; transform-origin: center bottom; }
        @keyframes animal-roll { 0% { transform: rotate(0) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        .animal-roll { animation: animal-roll 1.1s ease-in-out; }
        @keyframes animal-purr { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.08); } 50% { transform: scale(0.95); } 75% { transform: scale(1.05); } }
        .animal-purr { animation: animal-purr 1s ease-in-out; }
        @keyframes animal-stomp { 0%, 100% { transform: translateY(0) scale(1); } 30% { transform: translateY(-14px) scale(1.08); } 60% { transform: translateY(6px) scale(1.15, 0.85); } }
        .animal-stomp { animation: animal-stomp 0.9s ease-out; }

        @keyframes food-wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
        .food-wiggle { animation: food-wiggle 2.4s ease-in-out infinite; }

        @keyframes heart-float { 0% { transform: translateY(0) scale(0.6); opacity: 0; } 20% { transform: translateY(-20px) scale(1.1); opacity: 1; } 100% { transform: translateY(-140px) scale(0.9); opacity: 0; } }
        .heart-float { animation: heart-float 1.5s ease-out forwards; }

        /* Compare game */
        @keyframes slot-drop { 0% { transform: translateY(-40px) scale(0.6); opacity: 0; } 60% { transform: translateY(8px) scale(1.1); opacity: 1; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .slot-drop { animation: slot-drop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop-in { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.18); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
        @keyframes mascot-cheer { 0% { transform: rotate(0) translateY(0); } 25% { transform: rotate(-8deg) translateY(-8px); } 50% { transform: rotate(0) translateY(0); } 75% { transform: rotate(8deg) translateY(-8px); } 100% { transform: rotate(0) translateY(0); } }
        .mascot-cheer { animation: mascot-cheer 0.8s ease-in-out; }

        /* Subtract game */
        @keyframes eat-poof { 0% { transform: scale(1) rotate(0); filter: grayscale(0); opacity: 1; } 50% { transform: scale(1.2) rotate(-12deg); filter: grayscale(0.4); opacity: 0.8; } 100% { transform: scale(0.85) rotate(8deg); filter: grayscale(1); opacity: 0.35; } }
        .eat-poof { animation: eat-poof 0.6s ease-out forwards; }
        .eaten { filter: grayscale(1); opacity: 0.35; transform: rotate(8deg); }
        @keyframes drop-in { 0% { transform: translateY(-30px) scale(0.6); opacity: 0; } 60% { transform: translateY(6px) scale(1.1); opacity: 1; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .drop-in { animation: drop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
        @keyframes badge-pop { 0% { transform: scale(0.6); opacity: 0; } 70% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .badge-pop { animation: badge-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
        @keyframes combo-flash { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #f59e0b; } 100% { transform: scale(1); } }
        .combo-flash { animation: combo-flash 0.5s ease-out; }

        /* Count game */
        @keyframes number-glow { 0%, 100% { text-shadow: 0 0 0 transparent; transform: scale(1); } 50% { text-shadow: 0 0 16px rgba(251,191,36,0.7); transform: scale(1.05); } }
        .number-glow { animation: number-glow 2.4s ease-in-out infinite; }
        @keyframes sparkle { 0% { opacity: 0; transform: scale(0) rotate(0); } 30% { opacity: 1; transform: scale(1) rotate(180deg); } 100% { opacity: 0; transform: scale(0.6) rotate(360deg); } }
        .sparkle { animation: sparkle 1.1s ease-out forwards; }
        @keyframes hand-tap { 0% { transform: translate(0,0) rotate(0); } 30% { transform: translate(-4px, -6px) rotate(-12deg); } 60% { transform: translate(0,0) rotate(0); } 100% { transform: translate(0,0) rotate(0); } }
        .hand-tap { animation: hand-tap 1.6s ease-in-out infinite; }
        @keyframes object-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .object-bounce { animation: object-bounce 1.6s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
