<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="Học từ vựng tiếng Anh qua trò chơi phiêu lưu đảo.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LingoLand">
    <link rel="icon" type="image/svg+xml" href="/lingo-land/favicon.svg">
    <link rel="apple-touch-icon" href="/lingo-land/icon.svg">
    <title>LingoLand - English Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .island-node { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .island-node:hover:not(.locked) { transform: scale(1.1) translateY(-5px); }
        .locked { filter: grayscale(1) opacity(0.6); cursor: not-allowed; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
        .card-back { transform: rotateY(180deg); }
        .progress-bar { transition: width 0.4s ease; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .floating { animation: bounce-subtle 3s ease-in-out infinite; }
        .perspective-1000 { perspective: 1000px; }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
