<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="Học từ vựng tiếng Anh qua trò chơi phiêu lưu đảo.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LingoLand">
    <link rel="icon" type="image/svg+xml" href="/lingo-land/favicon.svg">
    <link rel="apple-touch-icon" href="/lingo-land/icon.svg">
    <title>LingoLand - English Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .island-node { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .island-node:hover:not(.locked) { transform: scale(1.1) translateY(-5px); }
        .locked { filter: grayscale(1) opacity(0.6); cursor: not-allowed; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
        .card-back { transform: rotateY(180deg); }
        .progress-bar { transition: width 0.4s ease; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .floating { animation: bounce-subtle 3s ease-in-out infinite; }
        .perspective-1000 { perspective: 1000px; }
        @keyframes shake-x { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-8px); } 80% { transform: translateX(8px); } }
        .shake-x { animation: shake-x 0.45s ease-in-out; }
        @keyframes glow-pulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0); transform: scale(1); } 50% { box-shadow: 0 0 28px 10px rgba(16,185,129,0.55); transform: scale(1.08); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); transform: scale(1); } }
        .glow-pulse { animation: glow-pulse 0.9s ease-out; }
        .shadow-silhouette { filter: brightness(0) drop-shadow(0 6px 10px rgba(0,0,0,0.2)); }
        @keyframes balloon-float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        .balloon-float { animation: balloon-float 2.6s ease-in-out infinite; }
        @keyframes balloon-pop { 0% { transform: scale(1); opacity: 1; } 35% { transform: scale(1.35); opacity: 0.85; } 100% { transform: scale(0); opacity: 0; } }
        .balloon-pop { animation: balloon-pop 0.5s ease-out forwards; }
        .balloon-btn { position: relative; }
        .balloon-btn::before { content: ''; position: absolute; top: 14%; left: 22%; width: 22%; height: 14%; background: rgba(255,255,255,0.55); border-radius: 50%; filter: blur(2px); pointer-events: none; }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
